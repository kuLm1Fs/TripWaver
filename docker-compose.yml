services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - SEARCH_PROVIDER=mock
      - LLM_PROVIDER=mock
      - DB_URL=postgresql+asyncpg://tripweaver:tripweaver@postgres:5432/tripweaver
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=tripweaver-dev-secret-xxx
      - CORS_ORIGINS=["*"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tripweaver
      POSTGRES_PASSWORD: tripweaver
      POSTGRES_DB: tripweaver
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripweaver"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
